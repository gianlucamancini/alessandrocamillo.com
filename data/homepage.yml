profile: >-
  # ALESSANDRO CAMILLO


  Diplômé de l’Université de Turin (Italie) en 2011 en DAMS Disciplines de l'Arts, de la Musique et du Spectacle, je travaille depuis 2012 comme réalisateur, photographe et directeur artistique.


  Fort d’une formation en histoire de l’art, en histoire de la musique et en cinéma, mon travail se concentre principalement sur les domaines de l’art et de la culture. Je réalise des vidéos et des reportages visuels pour des musées, fondations, galeries d’art, associations et institutions culturelles.


  En octobre 2019, je me suis installé à Paris, où j’ai collaboré avec un large éventail d’agences créatives, parmi lesquelles Agence VU, Publicis Conseil, BETC, General Pop, Prodigious, Mutt Agency, Glory Paris, Label 6&7, Pelican, Bengale.tv, Women360 Management, When We Were Kids, Lieurac Production et Unify Studio.


  Parmi mes principaux clients figurent notamment Carrefour, Subway, Canal+, Disneyland Paris et Baileys.


  Parallèlement à mes réalisations commerciales et culturelles, je développe un projet personnel dédié à la photographie naturaliste animalière.


  .


  EXPOSITIONS PHOTOGRAPHIQUES


  > ### *"À l'intérieur, c'est l'enfer"*

  >

  > Série de témoignages et de portraits en noir et blanc (photographie argentique), tirés en grand format (80 × 120 cm), réalisée avec le soutien de La Cimade, de la CFDT et du laboratoire photographique Dupon.

  >

  > À travers une série de photographies et de témoignages recueillis entre octobre 2020 et novembre 2021, d’anciens retenus du Centre de rétention administrative du Mesnil-Amelot (77) prennent la parole pour révéler et dénoncer la réalité opaque de l’enfermement dans ces zones de non-droit.

  >

  > – PARIS CFDT – GRAND HALL (2021)

  >

  > – PARIS THÉÂTRE DE L’ODÉON – ATELIERS BERTHIER (2022)

  >

  > – STRASBOURG – Paroisse du Bouclier (2022)

  >

  > ### *"Déliquescences"*

  >

  > *Déliquescences* est un projet artistique qui explore la photographie comme un médium vivant, en constante évolution et marqué par une certaine fragilité. À travers cette démarche, j’explore l’interaction entre la matière photographique et des processus organiques, au-delà de toute forme de contrôle humain.

  >

  > \- PARIS PRINT CLUB - CLASH (2024)


  .


